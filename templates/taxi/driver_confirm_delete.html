{% extends "base.html" %}

{% block content %}
  <div class="container mt-4">
    <h2>Delete Driver</h2>
    <p>Are you sure you want to delete the driver: <strong>{{ driver.username }}</strong>?</p>
    <form action="" method="post">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger">Yes, delete</button>
      <a href="{% url 'taxi:driver-detail' pk=driver.id %}" class="btn btn-secondary">Cancel</a>
    </form>
  </div>
{% endblock %}
