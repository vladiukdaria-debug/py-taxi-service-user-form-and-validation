{% extends "base.html" %}

{% block content %}
  <h1>Delete Driver</h1>

  <p>
    Are you sure you want to delete
    <strong>{{ driver.username }}</strong>?
  </p>

  <form action="" method="post">
    {% csrf_token %}

    <button type="submit" class="btn btn-danger">
      Yes, delete
    </button>

    <button
        type="button"
        class="btn btn-secondary"
        onclick="history.back()"
    >
      Cancel
    </button>
  </form>
{% endblock %}
