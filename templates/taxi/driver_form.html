{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block content %}
  <div class="container mt-4">
    <h2>
      {% if object %}
        Update Driver License
      {% else %}
        Create Driver
      {% endif %}
    </h2>

    <form action="" method="post">
      {% csrf_token %}
      {{ form|crispy }}

      <div class="mt-3">
        <button type="submit" class="btn btn-primary">Submit</button>

        {% if object %}
          <a href="{% url 'taxi:driver-detail' pk=object.id %}" class="btn btn-secondary">Cancel</a>
        {% else %}
          <a href="{% url 'taxi:driver-list' %}" class="btn btn-secondary">Cancel</a>
        {% endif %}
      </div>
    </form>
  </div>
{% endblock %}
